<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Hub — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-card h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .login-card p {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .login-card input {
            width: 100%;
            padding: 12px 16px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .login-card input:focus {
            border-color: #6c5ce7;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-card button:hover {
            background: #7d6ff0;
        }
        .error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🎬 Creator Hub</h1>
        <p>Enter password to continue</p>
        <input type="password" id="password" placeholder="Password" autofocus onkeydown="if(event.key==='Enter')doLogin()">
        <button onclick="doLogin()">Login</button>
        <p class="error" id="error-msg">Wrong password</p>
    </div>
    <script>
        async function doLogin() {
            const pw = document.getElementById('password').value;
            const resp = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password: pw})
            });
            const data = await resp.json();
            if (data.status === 'ok') {
                window.location.reload();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
